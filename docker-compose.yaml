services:
  searxng:
    environment:
      - SEARXNG_BASE_URL="${SEARXNG_BASE_URL:-http://host.docker.internal:49004/}" 
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: always
    hostname: search
    networks:
      - searxng
    ports:
      - "49004:8080"
    volumes:
      - var/lib/srv/$USER/docker/casjaysdevdocker/searngx/config/searngx:/etc/searxng:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
        
  redis:
    container_name: redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    hostname: redis
    networks:
      - searxng
    volumes:
      - /var/lib/srv/$USER/docker/casjaysdevdocker/searngx/data/db/valkey:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
        
  networks:
    searxng:
